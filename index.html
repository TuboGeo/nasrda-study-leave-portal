<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>NASRDA Study Leave Portal</title>
<style>
:root{
  --navy-950:#0b1220; --navy-900:#101a2e; --navy-800:#16213e; --navy-700:#1e2b4d;
  --paper:#f6f4ee; --ink:#161616; --muted:#6b7280; --line:#26314f;
  --gold:#c99a3c; --gold-soft:#e9d7a8;
  --ok:#3f8f5f; --warn:#c99a3c; --bad:#b5493f; --info:#4c7ea6;
  --radius:10px;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
*{box-sizing:border-box;}
body,html{margin:0;padding:0;height:100%;}
.app{min-height:100vh;background:var(--paper);color:var(--ink);display:flex;flex-direction:column;}
.topbar{background:var(--navy-950);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);}
.brand{display:flex;align-items:center;gap:12px;}
.brand svg{display:block;}
.brand-text .t1{font-size:11px;letter-spacing:2px;color:var(--gold-soft);text-transform:uppercase;}
.brand-text .t2{font-size:17px;font-weight:600;}
.userbox{display:flex;align-items:center;gap:12px;font-size:13px;}
.role-pill{background:var(--navy-800);border:1px solid var(--gold);color:var(--gold-soft);padding:3px 10px;border-radius:20px;font-size:11px;letter-spacing:.5px;text-transform:uppercase;}
.btn{border:none;cursor:pointer;font-family:inherit;font-size:13px;border-radius:6px;padding:8px 14px;transition:.15s;}
.btn-primary{background:var(--gold);color:var(--navy-950);font-weight:600;}
.btn-primary:hover{background:#dbb257;}
.btn-ghost{background:transparent;border:1px solid #3a4568;color:#dfe3ee;}
.btn-ghost:hover{background:var(--navy-800);}
.btn-danger{background:var(--bad);color:#fff;}
.btn-small{padding:5px 10px;font-size:12px;}
.shell{flex:1;display:flex;min-height:0;}
.sidebar{width:210px;background:var(--navy-900);color:#cfd6e6;padding:18px 10px;flex-shrink:0;}
.nav-item{padding:10px 14px;border-radius:8px;font-size:13px;cursor:pointer;margin-bottom:2px;display:flex;align-items:center;gap:10px;}
.nav-item:hover{background:var(--navy-800);}
.nav-item.active{background:var(--gold);color:var(--navy-950);font-weight:600;}
.main{flex:1;padding:26px 30px;overflow-y:auto;}
h1.page-title{font-size:22px;margin:0 0 4px;color:var(--navy-950);}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:22px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px;}
.card{background:#fff;border:1px solid #e4e0d3;border-radius:var(--radius);padding:16px 18px;}
.card .num{font-size:26px;font-weight:700;color:var(--navy-950);}
.card .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.panel{background:#fff;border:1px solid #e4e0d3;border-radius:var(--radius);padding:18px;margin-bottom:20px;}
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
input[type=text],input[type=email],input[type=password],select{
  font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid #d8d3c2;border-radius:6px;background:#fff;
}
input[type=text]:focus,select:focus{outline:2px solid var(--gold-soft);border-color:var(--gold);}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{text-align:left;padding:9px 10px;background:var(--navy-950);color:#e9e7dd;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;}
td{padding:9px 10px;border-bottom:1px solid #eee6d2;vertical-align:top;}
tr.rowclick{cursor:pointer;}
tr.rowclick:hover td{background:#faf7ee;}
.fn{font-family:'SF Mono',Consolas,monospace;font-size:11.5px;color:var(--info);}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.pill.ok{background:#e2f0e6;color:var(--ok);}
.pill.warn{background:#f8edd6;color:var(--warn);}
.pill.bad{background:#f6e0dd;color:var(--bad);}
.pill.info{background:#dfeaf1;color:var(--info);}
.center-screen{flex:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,var(--navy-950),var(--navy-900));}
.auth-card{background:#fff;border-radius:14px;padding:40px 38px;width:400px;box-shadow:0 30px 60px rgba(0,0,0,.35);}
.auth-card h2{margin:0 0 4px;font-size:20px;}
.auth-card p.sub{color:var(--muted);font-size:13px;margin:0 0 22px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:#333;}
.field input,.field select{width:100%;}
.auth-foot{margin-top:16px;font-size:12px;color:var(--muted);text-align:center;}
.auth-foot a{color:var(--info);cursor:pointer;text-decoration:underline;}
.notice{background:#fbf3df;border:1px solid var(--gold-soft);border-radius:8px;padding:10px 14px;font-size:12px;color:#6b551f;margin-bottom:16px;}
.modal-bg{position:fixed;inset:0;background:rgba(11,18,32,.55);display:flex;align-items:center;justify-content:center;z-index:50;}
.modal{background:#fff;border-radius:12px;width:640px;max-height:85vh;overflow-y:auto;padding:26px 28px;}
.modal h3{margin:0 0 2px;}
.modal .fnrow{color:var(--info);font-family:monospace;font-size:12px;margin-bottom:18px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;margin-bottom:18px;}
.detail-grid .full{grid-column:1/3;}
.detail-grid label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:3px;}
.detail-grid .val{font-size:13.5px;}
.status-editors{border-top:1px solid #eee;padding-top:16px;margin-top:6px;}
.status-editors h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0 0 10px;}
.status-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;}
.status-row label{width:180px;flex-shrink:0;color:#333;font-weight:600;font-size:12.5px;}
.locked{color:#bbb;font-size:12px;font-style:italic;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.smallnote{font-size:11.5px;color:var(--muted);margin-top:6px;}
.hero-band{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:22px;}
.hero-card{border-radius:12px;padding:20px 22px;color:#fff;position:relative;overflow:hidden;}
.hero-card .hnum{font-size:38px;font-weight:800;line-height:1;}
.hero-card .hlbl{font-size:12.5px;margin-top:8px;opacity:.92;font-weight:600;letter-spacing:.2px;}
.hero-card .hsub{font-size:11px;margin-top:4px;opacity:.75;}
.hero-navy{background:linear-gradient(135deg,#16213e,#0b1220);}
.hero-amber{background:linear-gradient(135deg,#c99a3c,#a97b22);}
.hero-red{background:linear-gradient(135deg,#c1554a,#8f342b);}
.hero-green{background:linear-gradient(135deg,#3f8f5f,#286640);}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;align-items:start;}
@media (max-width:900px){.two-col{grid-template-columns:1fr;}}
.summary-table{width:100%;border-collapse:collapse;font-size:13px;}
.summary-table td{padding:8px 4px;border-bottom:1px solid #f0ecdf;}
.summary-table td.n{text-align:right;font-weight:700;}
.summary-table tr.total td{border-top:2px solid var(--navy-950);font-weight:800;padding-top:10px;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;}
.dot.ok{background:var(--ok);} .dot.warn{background:var(--warn);} .dot.bad{background:var(--bad);} .dot.info{background:var(--info);}
.mini-list{list-style:none;padding:0;margin:0;font-size:12.5px;}
.mini-list li{padding:7px 0;border-bottom:1px solid #f2eee0;display:flex;justify-content:space-between;}
.panel h3{margin:0 0 12px;font-size:14px;}
.role-banner{font-size:12px;color:var(--muted);margin-bottom:16px;}
::-webkit-scrollbar{width:9px;}
::-webkit-scrollbar-thumb{background:#d8d3c2;border-radius:6px;}
</style>

</head><body>

<script>
// Core personnel-record fields (aggregated from spreadsheets - correctable by permitted roles).
const CORE_FIELDS = ["name","dept","desig","course","school","ptft","duration","commence_start","commence_end","qual","rec"];

// Tracking/workflow fields, grouped by the department that owns them in the real process.
const ADMINISTRATION_FIELDS = ["admin_file_updated","assumption_duty_status","assumption_duty_date","unit_division_id","defaulter_status","defaulter_reason","disciplinary_status","disciplinary_details","extension_status","extension_new_end_date","extension_notes"];
const HR_FIELDS = ["hr_letter_status","staff_email"];
const LEGAL_FIELDS = ["legal_bond_status","bond_duration"];
const APTC_FIELDS = ["doc_screening_status","rec","aptc_comments"];
const OVERLAY_FIELDS = ["assumption_duty_status","assumption_duty_date","doc_screening_status","legal_bond_status","bond_duration",
  "admin_file_updated","hr_letter_status","director_issuance_status","aptc_comments",
  "defaulter_status","defaulter_reason","disciplinary_status","disciplinary_details",
  "staff_email","unit_division_id","extension_status","extension_new_end_date","extension_notes","notes"];

const ROLES = {
  SUPERUSER: {label:"Superuser (System Admin)", can_edit_all:true},
  ADMINISTRATION: {label:"Administration", can_edit: ADMINISTRATION_FIELDS.concat(["notes"])},
  HR: {label:"HR / Admin", can_edit: HR_FIELDS.concat(["notes","progress_reports"])},
  LEGAL: {label:"Legal Services", can_edit: LEGAL_FIELDS.concat(["notes"])},
  APTC: {label:"APTC Committee", can_edit: APTC_FIELDS.concat(["notes"])},
  DIRECTOR: {label:"Director", can_edit:["director_issuance_status","assumption_duty_status","assumption_duty_date"]},
  HOD: {label:"HOD", can_edit:[]},
  VIEWER: {label:"Department Viewer", can_edit:[]},
};
const FULL_ACCESS_ROLES = ["SUPERUSER"];
function isFullAccess(role){ return FULL_ACCESS_ROLES.includes(role); }
function canEditField(field){
  if(!session) return false;
  if(isFullAccess(session.role)) return true;
  return (ROLES[session.role].can_edit || []).includes(field);
}

let session = null; // {email,name,role,dept}
let usersCache = [];
let pendingCache = [];
let overlayCache = {};
let currentView = "overview";
let searchQ = "";
let deptFilter = "";
let colFilters = {};
let authView = "login"; // "login" | "request"
let forceResetEmail = null;
let forceResetOldPassword = null;
let sectionFilter = "";
let modalFn = null;

// ---------------- BACKEND API (accounts, login, requests) ----------------
// Accounts, sign-in, and access requests are handled by the real backend server
// (see /backend in this project) - this is genuinely shared, not per-browser.
// Staff-record tracking data (overlayCache below) is a separate, still-local-only
// system for now - see the README for what that means.
// Your live backend - baked in so everyone who opens this link connects to the
// same shared server automatically, no setup step required.
const DEFAULT_API_BASE = "https://nslp-backend.onrender.com";
function getApiBase(){
  let base = null;
  try{ base = localStorage.getItem("nslp_api_base"); }catch(e){}
  return base || DEFAULT_API_BASE;
}
let API_BASE = getApiBase();
let authToken = null;
let superuserExists = false;
let apiError = null;

async function apiFetch(path, opts){
  opts = opts || {};
  const headers = Object.assign({"Content-Type":"application/json"}, opts.headers||{});
  if(authToken) headers.Authorization = "Bearer " + authToken;
  let res;
  try{
    res = await fetch(API_BASE + path, Object.assign({}, opts, {headers}));
  }catch(e){
    throw new Error("Couldn't reach the server at " + API_BASE + ". If it's hosted on Render's free tier, it may just be waking up after being idle - wait ~30 seconds and try again.");
  }
  let body = null;
  try{ body = await res.json(); }catch(e){}
  if(res.status === 401 && session){
    // session expired mid-use - bounce back to login
    session = null; authToken = null; currentView = "overview";
  }
  if(!res.ok){
    throw new Error((body && body.error) || ("Server error (" + res.status + ")"));
  }
  return body;
}
function reconfigureServer(){
  const entered = window.prompt("Backend server URL:", API_BASE);
  if(entered === null) return; // cancelled
  const base = entered.trim().replace(/\/$/,"");
  try{
    if(base && base !== DEFAULT_API_BASE) localStorage.setItem("nslp_api_base", base);
    else localStorage.removeItem("nslp_api_base");
  }catch(e){}
  API_BASE = getApiBase();
  apiError = null;
  render();
}
async function refreshAdminData(){
  try{
    usersCache = await apiFetch("/api/users");
    pendingCache = await apiFetch("/api/pending-requests");
  }catch(e){
    alert("Couldn't load Admin data: " + e.message);
  }
}

// Storage abstraction for staff-record tracking data only (accounts/login now live in
// the backend above): uses Claude's artifact window.storage when this is viewed live
// inside Claude (shared across everyone who opens the artifact there); falls back to
// this browser's localStorage when the file is opened standalone / hosted elsewhere
// (data then stays local to this browser only - see the README).
const HAS_CLAUDE_STORAGE = (typeof window !== "undefined" && !!window.storage);
let usingFallbackStorage = !HAS_CLAUDE_STORAGE;
let usingMemoryOnlyStorage = false;
const memoryStore = {};

async function storageGet(key){
  if(HAS_CLAUDE_STORAGE){
    try{ return await window.storage.get(key, true); }
    catch(e){ return null; }
  }
  if(usingMemoryOnlyStorage){
    return (key in memoryStore) ? {key, value: memoryStore[key]} : null;
  }
  try{
    const v = localStorage.getItem("nslp:"+key);
    return v ? {key, value:v} : null;
  }catch(e){
    usingMemoryOnlyStorage = true;
    return (key in memoryStore) ? {key, value: memoryStore[key]} : null;
  }
}
async function storageSet(key, value){
  if(HAS_CLAUDE_STORAGE){
    try{ return await window.storage.set(key, value, true); }
    catch(e){ throw e; }
  }
  if(usingMemoryOnlyStorage){
    memoryStore[key] = value;
    return {key, value};
  }
  try{
    localStorage.setItem("nslp:"+key, value);
    return {key, value};
  }catch(e){
    usingMemoryOnlyStorage = true;
    memoryStore[key] = value;
    return {key, value};
  }
}

  if(!/[A-Z]/.test(pass)) return "Passphrase must include at least one uppercase letter.";
  if(!/[a-z]/.test(pass)) return "Passphrase must include at least one lowercase letter.";
  if(!/[0-9]/.test(pass)) return "Passphrase must include at least one number.";

// ---------------- CORE FIELD CORRECTIONS ----------------
// This data was aggregated from messy real-world spreadsheets, so every core field
// (not just the tracking-status ones) needs to be correctable. Corrections are stored
// per file number, keyed with a "corr_" prefix so they never collide with the tracking
// fields, and every read of these fields elsewhere in the app goes through fval(), so a
// correction to e.g. a garbled commencement date immediately feeds into the overstay
// calculations too - not just the display.
function fval(s, field){
  const ov = overlayCache[s.fn] || {};
  const key = "corr_" + field;
  return (ov[key] !== undefined && ov[key] !== "") ? ov[key] : (s[field] || "");
}
function isCorrected(s, field){
  const ov = overlayCache[s.fn] || {};
  const key = "corr_" + field;
  return ov[key] !== undefined && ov[key] !== "" && ov[key] !== (s[field] || "");
}
function displayName(s){
  return fval(s,"name") || s.name || "(unnamed)";
}

function classifyRec(rec){
  const r = (rec||"").toLowerCase();
  if(r.includes("not approved")) return "bad";
  if(r.includes("pending")) return "warn";
  if(r.includes("approved")) return "ok";
  if(r.includes("noted")) return "info";
  return "info";
}
function recLabel(rec){
  const r = (rec||"").toLowerCase();
  if(r.includes("not approved")) return "Not Approved";
  if(r.includes("pending")) return "Pending";
  if(r.includes("approved")) return "Approved";
  if(r.includes("noted")) return "Noted";
  return "Other";
}

function departments(){

  return Array.from(s).sort();
}

// ---------------- DATE / STATUS ENGINE ----------------
// Best-effort parsing of the free-text commencement/duration fields from the source
// sheets into real start/end dates, so dashboard numbers reflect actual data rather
// than being invented. Records that can't be confidently parsed are counted
// separately as "Unknown" rather than silently guessed at.
const MONTHS_JS = {january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11};
function parseSingleDate(s){
  if(!s) return null;
  s = s.toLowerCase();
  let m = s.match(/(\d{1,2})(?:st|nd|rd|th)?\s+([a-z]+)\.?,?\s+(\d{4})/);
  if(m && MONTHS_JS[m[2]] !== undefined) return new Date(parseInt(m[3]), MONTHS_JS[m[2]], parseInt(m[1]));
  m = s.match(/([a-z]+)\.?,?\s+(\d{4})/);
  if(m && MONTHS_JS[m[1]] !== undefined) return new Date(parseInt(m[2]), MONTHS_JS[m[1]], 1);
  m = s.match(/(\d{4})/);
  if(m) return new Date(parseInt(m[1]), 0, 1);
  return null;
}
function parseDurationMonths(s){
  if(!s) return null;
  s = s.toLowerCase();
  let m = s.match(/(\d+(?:\.\d+)?)\s*year/);
  if(m) return Math.round(parseFloat(m[1])*12);
  m = s.match(/(\d+)\s*month/);
  if(m) return parseInt(m[1]);
  return null;
}
function parseAllDates(text){
  if(!text) return [];
  const s = text.toLowerCase();
  const out = [];
  const re1 = /(\d{1,2})(?:st|nd|rd|th)?\s+([a-z]+)\.?,?\s+(\d{4})/g;
  let m;
  while((m = re1.exec(s))){
    if(MONTHS_JS[m[2]] !== undefined) out.push({idx:m.index, date:new Date(parseInt(m[3]), MONTHS_JS[m[2]], parseInt(m[1]))});
  }
  const re2 = /([a-z]+)\.?,?\s+(\d{4})/g;
  while((m = re2.exec(s))){
    if(MONTHS_JS[m[1]] !== undefined && !out.some(o=>Math.abs(o.idx-m.index)<3)) out.push({idx:m.index, date:new Date(parseInt(m[2]), MONTHS_JS[m[1]], 1)});
  }
  out.sort((a,b)=>a.idx-b.idx);
  return out;
}
function parseRange(commence, duration){
  if(!commence) return {start:null, end:null};
  const dates = parseAllDates(commence);
  if(dates.length === 0) return {start:null, end:null};
  const start = dates[0].date;
  // Only accept a later date as the "end" - source sheets sometimes append unrelated
  // commentary with an earlier date (e.g. "...admission letter shows programme began
  // in 2022") after the real range, which a naive split would otherwise grab.
  const laterCandidates = dates.slice(1).filter(d => d.date > start);
  if(laterCandidates.length){
    return {start, end: laterCandidates[laterCandidates.length-1].date};
  }
  const durMonths = parseDurationMonths(duration);
  if(durMonths) return {start, end: new Date(start.getFullYear(), start.getMonth()+durMonths, start.getDate())};
  return {start, end:null};
}
function isMarkedCompleted(s){
  const blob = (fval(s,"commence_start")+" "+fval(s,"commence_end")+" "+(s.commence||"")+" "+fval(s,"duration")+" "+fval(s,"rec")).toLowerCase();
  return blob.includes("complet");
}
const TODAY = new Date();
function effectiveRange(s){
  // Prefer the two split date fields (correctable independently); fall back to the
  // original combined text if either one is blank or unparseable.
  const startStr = fval(s,"commence_start");
  const endStr = fval(s,"commence_end");
  let base;
  if(startStr && endStr){
    base = {start: parseSingleDate(startStr), end: parseSingleDate(endStr)};
  } else {
    base = parseRange(s.commence, fval(s,"duration"));
  }
  const ov = overlayCache[s.fn] || {};
  if(ov.extension_status === "Approved" && ov.extension_new_end_date){
    const extEnd = parseSingleDate(ov.extension_new_end_date);
    if(extEnd) return {start: base.start, end: extEnd, extended: true};
  }
  return {start: base.start, end: base.end, extended: false};
}
function computedStatus(s){
  if(isMarkedCompleted(s)) return "Completed";
  const {start, end} = effectiveRange(s);
  if(!start && !end) return "Unknown";
  if(start && TODAY < start) return "Not Yet Commenced";
  if(!end) return "Unknown";
  const daysLeft = Math.round((end - TODAY) / 86400000);
  if(daysLeft < -30) return "Critical";
  if(daysLeft < 0) return "Overdue";
  if(daysLeft <= 30) return "Due Soon";
  return "On Track";
}
function effectiveCategory(s){
  // Single source of truth: a manually-confirmed Assumption of Duty status always
  // wins; otherwise fall back to the best-effort computed status from parsed dates.
  const ov = overlayCache[s.fn] || {};
  if(ov.assumption_duty_status === "Resumed") return "Completed";
  if(ov.assumption_duty_status === "Overdue") return "Critical";
  return computedStatus(s);
}
function effectiveAssumptionStatus(s){
  const ov = overlayCache[s.fn] || {};
  if(ov.assumption_duty_status) return ov.assumption_duty_status;
  const cs = computedStatus(s);
  if(cs==="Completed") return "Resumed";
  if(cs==="Critical" || cs==="Overdue") return "Overdue";
  return "Not Due";
}
function computeStats(list){
  const st = {
    total: list.length, active:0, dueSoon:0, overdue:0, critical:0, notStarted:0, completed:0, unknown:0,
    byRec:{ok:0,warn:0,bad:0,info:0}, bonded:0, unbonded:0, resumedManual:0,
    hrLetterIssued:0, hrLetterPending:0, directorIssued:0, directorPending:0, awaitingDirectorOnly:0,
    docScreeningIncomplete:0, adminFileUpdated:0,
    progressOverdueManual:0, extensionRequested:0, extensionApproved:0,
    defaulterCount:0, disciplinaryPending:0
  };
  for(const s of list){
    st.byRec[classifyRec(fval(s,"rec"))]++;
    const ov = overlayCache[s.fn] || {};
    const cs = effectiveCategory(s);
    if(cs==="Completed") st.completed++;
    else if(cs==="Not Yet Commenced") st.notStarted++;
    else if(cs==="Unknown") st.unknown++;
    else {
      st.active++;
      if(cs==="Due Soon") st.dueSoon++;
      else if(cs==="Overdue") st.overdue++;
      else if(cs==="Critical") st.critical++;
    }
    if(ov.legal_bond_status==="Bonded") st.bonded++; else st.unbonded++;
    if(ov.assumption_duty_status==="Resumed") st.resumedManual++;
    if(ov.hr_letter_status==="Transmitted to Director") st.hrLetterIssued++; else st.hrLetterPending++;
    if(ov.director_issuance_status==="Issued to Staff") st.directorIssued++; else st.directorPending++;
    if(ov.hr_letter_status==="Transmitted to Director" && ov.director_issuance_status!=="Issued to Staff") st.awaitingDirectorOnly++;
    if(ov.doc_screening_status==="Incomplete - Returned for Correction") st.docScreeningIncomplete++;
    if(ov.admin_file_updated==="Updated") st.adminFileUpdated++;
    if(effectiveProgressCompliance(s)==="Overdue") st.progressOverdueManual++;
    if(ov.extension_status==="Requested") st.extensionRequested++;
    if(ov.extension_status==="Approved") st.extensionApproved++;
    if(ov.defaulter_status==="Defaulter") st.defaulterCount++;
    if(ov.disciplinary_status==="Pending Investigation") st.disciplinaryPending++;
  }
  return st;
}
function daysUntilDue(s){
  const {end} = effectiveRange(s);
  if(!end) return null;
  return Math.round((end - TODAY) / 86400000);
}

// ---------------- PROGRESS REPORT TRACKING ----------------
// Staff on study leave submit a progress report every 4 months (3 per year) for
// the duration of their leave. We compute which reporting periods have come due
// so far (from commencement to today, or to the end date if the leave has already
// finished) and compare that against what's been logged.
function expectedReportPeriods(s){
  const {start, end} = effectiveRange(s);
  if(!start) return [];
  const capEnd = (end && end < TODAY) ? end : TODAY;
  const periods = [];
  let d = new Date(start.getFullYear(), start.getMonth(), 1);
  let idx = 1;
  while(d <= capEnd){
    periods.push({key:"Q"+idx, label:"Report "+idx+" (from "+d.toLocaleDateString("en-GB",{month:"short",year:"numeric"})+")"});
    d = new Date(d.getFullYear(), d.getMonth()+4, 1);
    idx++;
  }
  return periods;
}
function progressReportStats(s){
  const quarters = expectedReportPeriods(s);
  const ov = overlayCache[s.fn] || {};
  const submissions = ov.progress_reports || {};
  let submitted = 0;
  for(const q of quarters){ if(submissions[q.key] && submissions[q.key].submitted) submitted++; }
  return {expected: quarters.length, submitted, missing: quarters.length - submitted, quarters, submissions};
}
function effectiveProgressCompliance(s){
  const cs = effectiveCategory(s);
  if(cs === "Completed" || cs === "Not Yet Commenced" || cs === "Unknown") return "N/A";
  const {missing} = progressReportStats(s);
  return missing > 0 ? "Overdue" : "Up-to-Date";
}
function extensionLabel(s){
  const ov = overlayCache[s.fn] || {};
  return ov.extension_status || "N/A";
}
function statColor(kind){
  return {ok:"ok",warn:"warn",bad:"bad",info:"info",critical:"bad",dueSoon:"warn",active:"info"}[kind]||"info";
}

function attachAuthHandlers(){
  const rc1 = document.getElementById("reconfig-btn");
  if(rc1) rc1.onclick = ()=>{ reconfigureServer(); };
  const rc2 = document.getElementById("reconfig-link");
  if(rc2) rc2.onclick = (e)=>{ e.preventDefault(); reconfigureServer(); };

  const su = document.getElementById("su-submit");
  if(su){
    su.onclick = async ()=>{
      const err = document.getElementById("su-err");
      try{
        const name = document.getElementById("su-name").value.trim();
        const email = document.getElementById("su-email").value.trim().toLowerCase();
        const pass = document.getElementById("su-pass").value;
        const pass2 = document.getElementById("su-pass2").value;
        if(!name || !email || !pass){ err.textContent = "Please fill in every field."; return; }
        const pwErr = validatePassword(pass); if(pwErr){ err.textContent = pwErr; return; }
        if(pass !== pass2){ err.textContent = "Passphrases don't match."; return; }
        su.disabled = true; su.textContent = "Creating account...";
        const data = await apiFetch("/api/setup", {method:"POST", body: JSON.stringify({name, email, password: pass})});
        authToken = data.token;
        session = {email:data.user.email, name:data.user.name, role:data.user.role, dept:data.user.department||""};
        superuserExists = true;
        currentView = "overview";
        render();
      }catch(e){
        err.textContent = e.message;
        su.disabled = false; su.textContent = "Create Superuser account & sign in";
      }
    };
  }
  const li = document.getElementById("li-submit");
  if(li){
    li.onclick = async ()=>{
      const err = document.getElementById("li-err");
      try{
        const email = document.getElementById("li-email").value.trim().toLowerCase();
        const pass = document.getElementById("li-pass").value;
        if(!email || !pass){ err.textContent = "Enter both email and passphrase."; return; }
        li.disabled = true; li.textContent = "Signing in...";
        const data = await apiFetch("/api/login", {method:"POST", body: JSON.stringify({email, password: pass})});
        if(data.mustReset){
          forceResetEmail = email;
          forceResetOldPassword = pass;
          render();
          return;
        }
        authToken = data.token;
        session = {email:data.user.email, name:data.user.name, role:data.user.role, dept:data.user.department||""};
        currentView = "overview";
        render();
      }catch(e){
        err.textContent = e.message;
        li.disabled = false; li.textContent = "Sign in";
      }
    };
  }
  const rqOpen = document.getElementById("rq-open");
  if(rqOpen) rqOpen.onclick = ()=>{ authView = "request"; render(); };
  const rqBack = document.getElementById("rq-back");
  if(rqBack) rqBack.onclick = ()=>{ authView = "login"; render(); };
  const rq = document.getElementById("rq-submit");
  if(rq){
    rq.onclick = async ()=>{
      const err = document.getElementById("rq-err");
      try{
        const name = document.getElementById("rq-name").value.trim();
        const email = document.getElementById("rq-email").value.trim().toLowerCase();
        const role = document.getElementById("rq-role").value;
        const dept = document.getElementById("rq-dept").value;
        const designation = document.getElementById("rq-desig").value.trim();
        const pass = document.getElementById("rq-pass").value;
        const pass2 = document.getElementById("rq-pass2").value;
        if(!name || !email || !pass){ err.textContent = "Please fill in every required field."; return; }
        const pwErr = validatePassword(pass); if(pwErr){ err.textContent = pwErr; return; }
        if(pass !== pass2){ err.textContent = "Passphrases don't match."; return; }
        rq.disabled = true; rq.textContent = "Submitting...";
        await apiFetch("/api/request-access", {method:"POST", body: JSON.stringify({name, email, password: pass, role, department: dept, designation})});
        authView = "login";
        render();
        alert("Request submitted. An admin will review it before you can sign in.");
      }catch(e){
        err.textContent = e.message;
        rq.disabled = false; rq.textContent = "Submit request";
      }
    };
  }
  const fr = document.getElementById("fr-submit");
  if(fr){
    fr.onclick = async ()=>{
      const err = document.getElementById("fr-err");
      try{
        const pass = document.getElementById("fr-pass").value;
        const pass2 = document.getElementById("fr-pass2").value;
        const pwErr = validatePassword(pass); if(pwErr){ err.textContent = pwErr; return; }
        if(pass !== pass2){ err.textContent = "Passphrases don't match."; return; }
        const data = await apiFetch("/api/reset-password", {method:"POST", body: JSON.stringify({
          email: forceResetEmail, oldPassword: forceResetOldPassword, newPassword: pass
        })});
        authToken = data.token;
        session = {email:data.user.email, name:data.user.name, role:data.user.role, dept:data.user.department||""};
        forceResetEmail = null;
        forceResetOldPassword = null;
        currentView = "overview";
        render();
      }catch(e){
        err.textContent = e.message;
      }
    };
  }
}

  if(full || session.role==="HR") items.push(["hr","HR"]);
  if(full || session.role==="LEGAL") items.push(["legal","Legal"]);
  if(full || session.role==="ADMINISTRATION") items.push(["administration","Administration"]);
  if(full || session.role==="APTC") items.push(["aptc","APTC"]);
  if(full || session.role==="DIRECTOR" || session.role==="HOD") items.push(["director","Director"]);
  if(full){
    items.push(["overstay","Overstay & Critical"], ["progress","Progress Reports"], ["extensions","Extensions"]);
  }
  if(full) items.push(["admin","Admin: Users"]);
  return items;
}

function scopedStaff(){
  let list = STAFF_DATA;
  if((session.role==="DIRECTOR" || session.role==="HOD") && session.dept){
    list = list.filter(s=>fval(s,"dept")===session.dept);
  }
  return list;
}

function renderView(){
  const full = isFullAccess(session.role);
  const tabOwners = {hr:"HR", legal:"LEGAL", administration:"ADMINISTRATION", aptc:"APTC"};
  if(currentView in tabOwners && !full && session.role !== tabOwners[currentView]){
    currentView = "overview";
    return renderOverview();
  }
  if(currentView==="director" && !full && session.role!=="DIRECTOR" && session.role!=="HOD"){
    currentView = "overview";
    return renderOverview();
  }
  if(currentView==="master" && !full && session.role!=="VIEWER"){
    currentView = "overview";
    return renderOverview();
  }
  if((currentView==="overstay" || currentView==="progress" || currentView==="extensions") && !full){
    currentView = "overview";
    return renderOverview();
  }
  if(currentView==="overview") return renderOverview();
  if(currentView==="master") return renderListTab("master");
  if(currentView==="hr") return renderListTab("hr");
  if(currentView==="legal") return renderListTab("legal");
  if(currentView==="administration") return renderListTab("administration");
  if(currentView==="aptc") return renderListTab("aptc");
  if(currentView==="director") return renderListTab("director");
  if(currentView==="overstay") return renderOverstayTab();
  if(currentView==="progress") return renderProgressTab();
  if(currentView==="extensions") return renderExtensionsTab();
  if(currentView==="admin"){
    if(!full){
      currentView = "overview";
      return renderOverview();
    }
    return renderAdmin();
  }
  return "";
}

function fmtDuration(days){
  if(days>=365) return (days/365).toFixed(1)+" years";
  if(days>=30) return Math.round(days/30)+" months";
  return days+" days";
}
function overstaySummaryPanel(list){
  const flagged = list.map(s=>({s, cat: effectiveCategory(s), days: daysUntilDue(s)}))
    .filter(x=>x.cat==="Critical" || x.cat==="Overdue");
  const dueSoonCount = list.filter(s=>effectiveCategory(s)==="Due Soon").length;
  const overdueDays = flagged.map(x=>Math.abs(x.days||0));
  const avg = overdueDays.length ? Math.round(overdueDays.reduce((a,b)=>a+b,0)/overdueDays.length) : 0;
  const longest = overdueDays.length ? Math.max(...overdueDays) : 0;
  const buckets = {under3mo:0, mo3to12:0, over1yr:0};
  overdueDays.forEach(d=>{
    if(d<=90) buckets.under3mo++;
    else if(d<=365) buckets.mo3to12++;
    else buckets.over1yr++;
  });
  return `
  <div class="panel">
    <h3>Overstay Snapshot</h3>
    <div class="cards" style="margin-bottom:14px;">
      <div class="card"><div class="num">${flagged.length}</div><div class="lbl">Currently overdue/critical</div></div>
      <div class="card"><div class="num">${overdueDays.length ? fmtDuration(avg) : "—"}</div><div class="lbl">Average overdue length</div></div>
      <div class="card"><div class="num">${overdueDays.length ? fmtDuration(longest) : "—"}</div><div class="lbl">Longest outstanding case</div></div>
      <div class="card"><div class="num">${dueSoonCount}</div><div class="lbl">Due back within 30 days</div></div>
    </div>
    <ul class="mini-list">
      <li><span>Overdue &le; 3 months</span><span style="font-weight:700;">${buckets.under3mo}</span></li>
      <li><span>Overdue 3&ndash;12 months</span><span style="font-weight:700;">${buckets.mo3to12}</span></li>
      <li><span>Overdue &gt; 1 year</span><span style="font-weight:700;color:var(--bad);">${buckets.over1yr}</span></li>
    </ul>
    ${isFullAccess(session.role) ? `<button class="btn btn-ghost btn-small" data-goto="overstay" style="margin-top:10px;">See full list, named &rarr;</button>` : ""}
  </div>`;
}

function pillFor(kind, value){

function aodPill(s){
  const eff = effectiveAssumptionStatus(s);
  const c = eff==="Overdue" ? "bad" : eff==="Resumed" ? "ok" : "info";
  return pillFor(c, eff);
}
function recPill(s){ return pillFor(classifyRec(fval(s,"rec")), recLabel(fval(s,"rec"))); }

function fld(v, fallback){ return v || fallback; }

      ["Bond Status", s=>{ const b=(overlayCache[s.fn]||{}).legal_bond_status||"Unbonded"; return pillFor(b==="Bonded"?"ok":"warn", b); }],
      ["Bond Duration", s=>esc((overlayCache[s.fn]||{}).bond_duration || "—")],
    ]),
    ...g("HR", [
      ["Release Letter Transmitted to Director", s=>{ const v=(overlayCache[s.fn]||{}).hr_letter_status||"Not Yet Transmitted"; return pillFor(v==="Transmitted to Director"?"ok":"warn", v); }],
      ["Release Letter Issued to Staff", s=>{ const v=(overlayCache[s.fn]||{}).director_issuance_status||"Pending Issuance"; return pillFor(v==="Issued to Staff"?"ok":"warn", v); }],
    ]),
    ...g("Administration", [
      ["Admin File Updated (at Approval)", s=>{ const v=(overlayCache[s.fn]||{}).admin_file_updated||"Not Updated"; return pillFor(v==="Updated"?"ok":"warn", v); }],
    ]),
  ];
}

const GROUP_COLORS = {
  "Personnel Record":"#e7ecf5", "Compliance":"#fbe9d8", "APTC":"#dfeaf1",
  "Progress / Assumption of Duty":"#e2f0e6", "Legal":"#f3e3e0", "HR":"#f8edd6", "Administration":"#e9e4f2"
};
function groupHeaderRow(cols){
  if(!cols[0] || cols[0].length < 3) return "";
  const runs = [];
  for(const c of cols){
    const grp = c[2];
    if(runs.length && runs[runs.length-1].label === grp) runs[runs.length-1].span++;
    else runs.push({label: grp, span: 1});
  }
  return `<tr>${runs.map(r=>`<th colspan="${r.span}" style="background:${GROUP_COLORS[r.label]||'#eee'};color:#222;font-size:10.5px;text-align:center;">${esc(r.label)}</th>`).join("")}</tr>`;
}

const TAB_TITLES = {master:"Master List", hr:"HR", legal:"Legal", administration:"Administration", aptc:"APTC", director:"Director"};

function filterDefsForTab(tab){
  const defs = {
    ptft: {label:"PT/FT", get:s=>fval(s,"ptft")||"—", options:["PT","FT"]},
    rec: {label:"Recommendation", get:s=>recLabel(fval(s,"rec")), options:["Approved","Pending","Not Approved","Noted","Other"]},
    aod: {label:"Assumption of Duty", get:s=>effectiveAssumptionStatus(s), options:["Not Due","Overdue","Resumed"]},
    bond: {label:"Bond Status", get:s=>(overlayCache[s.fn]||{}).legal_bond_status||"Unbonded", options:["Unbonded","Bonded"]},
    ext: {label:"Extension", get:s=>extensionLabel(s), options:["N/A","Requested","Approved","Denied"]},
    doc: {label:"Doc Screening", get:s=>(overlayCache[s.fn]||{}).doc_screening_status||"Complete", options:["Complete","Incomplete - Returned for Correction"]},
    defaulter: {label:"Defaulter Status", get:s=>(overlayCache[s.fn]||{}).defaulter_status||"Non-Defaulter", options:["Non-Defaulter","Defaulter"]},
    progress: {label:"Progress Report", get:s=>effectiveProgressCompliance(s), options:["Up-to-Date","Overdue","N/A"]},
  };
  const byTab = {
    master: ["ptft","rec","aod","bond","ext","doc","defaulter"],
    hr: ["progress"],
    legal: ["ptft","ext","bond"],
    administration: ["aod","defaulter"],
    aptc: ["ptft","doc","rec"],
    director: ["aod","rec"],
  };
  return (byTab[tab]||[]).map(id => ({id, ...defs[id]}));
}

function renderListTab(tab){
  const fdefs = filterDefsForTab(tab);
  const list = scopedStaff().filter(s=>{
    if(deptFilter && fval(s,"dept")!==deptFilter) return false;
    if(searchQ){
      const q = searchQ.toLowerCase();
      if(!(displayName(s).toLowerCase().includes(q) || s.fn.toLowerCase().includes(q))) return false;
    }
    for(const fd of fdefs){
      if(colFilters[fd.id] && fd.get(s) !== colFilters[fd.id]) return false;
    }
    return true;
  });
  const deptOpts = departments().map(d=>`<option value="${esc(d)}" ${deptFilter===d?"selected":""}>${esc(d)}</option>`).join("");
  const cols = columnsForTab(tab);
  const rows = list.slice(0,300).map(s=>{
    return `<tr class="rowclick" data-fn="${esc(s.fn)}">${cols.map(([,fn])=>`<td>${fn(s)}</td>`).join("")}</tr>`;
  }).join("");
  const filterSelects = fdefs.map(fd=>`
    <select class="col-filter" data-colfilter="${fd.id}">
      <option value="">${esc(fd.label)}: All</option>
      ${fd.options.map(o=>`<option value="${esc(o)}" ${colFilters[fd.id]===o?"selected":""}>${esc(o)}</option>`).join("")}
    </select>`).join("");
  return `
    <h1 class="page-title">${esc(TAB_TITLES[tab])}</h1>
    <p class="page-sub">${list.length} record${list.length===1?"":"s"}${list.length>300?" (showing first 300 &mdash; narrow your search)":""} &mdash; click any row to open the full record and edit it.</p>
    <div class="toolbar">
      <input type="text" id="search-box" placeholder="Search name or file number..." value="${esc(searchQ)}" style="width:260px;">
      <select id="dept-filter"><option value="">All departments/labs</option>${deptOpts}</select>
      ${filterSelects}
      ${Object.values(colFilters).some(Boolean) ? `<button class="btn btn-ghost btn-small" id="clear-filters">Clear filters</button>` : ""}
    </div>
    <div class="panel" style="padding:0;overflow:auto;max-height:65vh;">
      <table>
        <thead>
          ${groupHeaderRow(cols)}
          <tr>${cols.map(([h])=>`<th>${h}</th>`).join("")}</tr>
        </thead>
        <tbody>${rows || `<tr><td colspan="${cols.length}" class="empty">No matching records.</td></tr>`}</tbody>
      </table>
    </div>
  `;
}

function renderOverstayTab(){
  const list = scopedStaff();
  const flagged = list.map(s=>({s, cat: effectiveCategory(s), days: daysUntilDue(s)}))
    .filter(x=>x.cat==="Critical" || x.cat==="Overdue" || x.cat==="Due Soon")
    .sort((a,b)=>(a.days===null?999:a.days)-(b.days===null?999:b.days));
  const rows = flagged.map(({s,cat,days})=>{
    const color = cat==="Due Soon" ? "warn" : cat==="Overdue" ? "warn" : "bad";
    const daysLabel = days===null ? "—" : days<0 ? `${Math.abs(days)} days overdue` : `${days} days left`;
    const ext = extensionLabel(s);
    return `<tr class="rowclick" data-fn="${esc(s.fn)}">
      <td class="fn">${esc(s.fn)}</td><td>${esc(displayName(s))}</td><td>${esc(fval(s,"dept"))}</td><td>${esc(fval(s,"desig"))}</td>
      <td><span class="pill ${color}">${esc(cat)}</span></td><td>${daysLabel}</td><td>${esc(fval(s,"commence_start"))}</td><td>${esc(fval(s,"commence_end"))}</td>
      <td>${ext==="N/A" ? "—" : `<span class="pill ${ext==='Approved'?'ok':ext==='Requested'?'warn':'info'}">${esc(ext)}</span>`}</td>
    </tr>`;
  }).join("");
  return `
    <h1 class="page-title">Overstay &amp; Critical Cases</h1>
    <p class="page-sub">${flagged.length} record${flagged.length===1?"":"s"} currently overdue, critical, or due back within 30 days &mdash; worst-first. Click a row to open the record, log an extension, or confirm Assumption of Duty.</p>
    <div class="panel" style="padding:0;overflow:auto;max-height:70vh;">
      <table>
        <thead><tr><th>File Number</th><th>Name</th><th>Dept/Lab</th><th>Designation</th><th>Status</th><th>Timing</th><th>Proposed Commencement Date</th><th>Proposed Completion Date</th><th>Extension</th></tr></thead>
        <tbody>${rows || `<tr><td colspan="9" class="empty">Nothing flagged &mdash; all clear.</td></tr>`}</tbody>
      </table>
    </div>
  `;
}

function renderProgressTab(){
  const list = scopedStaff().filter(s=>{
    const cat = effectiveCategory(s);
    return cat!=="Completed" && cat!=="Not Yet Commenced" && cat!=="Unknown";
  });
  const rows = list.map(s=>{
    const pr = progressReportStats(s);
    const compliance = effectiveProgressCompliance(s);
    const color = compliance==="Overdue" ? "bad" : compliance==="N/A" ? "info" : "ok";
    return {s, pr, compliance, color};
  }).sort((a,b)=>b.pr.missing - a.pr.missing);
  const trs = rows.map(({s,pr,compliance,color})=>`
    <tr class="rowclick" data-fn="${esc(s.fn)}">
      <td class="fn">${esc(s.fn)}</td><td>${esc(displayName(s))}</td><td>${esc(fval(s,"dept"))}</td>
      <td>${pr.expected}</td><td>${pr.submitted}</td><td style="font-weight:700;">${pr.missing}</td>
      <td><span class="pill ${color}">${esc(compliance)}</span></td>
    </tr>`).join("");
  const totalMissing = rows.reduce((a,r)=>a+r.pr.missing,0);
  return `
    <h1 class="page-title">Progress Reports</h1>
    <p class="page-sub">Staff on active leave submit a progress report every 4 months (3 per year) for the duration of their study. ${totalMissing} report${totalMissing===1?"":"s"} ${totalMissing===1?"is":"are"} currently missing across ${list.length} active staff. Click a row to open the record and check off submitted reports.</p>
    <div class="panel" style="padding:0;overflow:auto;max-height:70vh;">
      <table>
        <thead><tr><th>File Number</th><th>Name</th><th>Dept/Lab</th><th>Expected</th><th>Submitted</th><th>Missing</th><th>Compliance</th></tr></thead>
        <tbody>${trs || `<tr><td colspan="7" class="empty">No active staff currently expected to submit reports.</td></tr>`}</tbody>
      </table>
    </div>
  `;
}

        <h4>Legal</h4>
        <div class="status-row"><label>Bond status</label>${sel("legal_bond_status",["Unbonded","Bonded"], ov.legal_bond_status||"Unbonded")}</div>
        <div class="status-row"><label>Bond duration</label><input type="text" data-field="bond_duration" value="${esc(ov.bond_duration||"")}" placeholder="e.g. 6 years" ${can("bond_duration")?"":"disabled"} style="flex:1;"></div>
      </div>

      <div class="status-editors">
        <h4>Release Letter</h4>
        <div class="status-row"><label>Transmitted to Director</label>${sel("hr_letter_status",["Not Yet Transmitted","Transmitted to Director"], ov.hr_letter_status||"Not Yet Transmitted")}</div>
        <div class="status-row"><label>Issued to Staff</label>${sel("director_issuance_status",["Pending Issuance","Issued to Staff"], ov.director_issuance_status||"Pending Issuance")}</div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-close">Close</button>
        <button class="btn btn-primary" id="modal-save">Save changes</button>
      </div>
    </div>
  </div>`;
}

// ---------------- HANDLERS ----------------
function attachShellHandlers(){
  document.getElementById("logout-btn").onclick = ()=>{ session=null; authToken=null; currentView="overview"; render(); };
  document.querySelectorAll("[data-nav]").forEach(el=>{
    el.onclick = ()=>{
      currentView = el.dataset.nav; searchQ=""; deptFilter=""; colFilters={};
      render();
      if(currentView === "admin"){ refreshAdminData().then(render); }
    };
  });
  document.querySelectorAll("[data-goto]").forEach(el=>{
    el.onclick = ()=>{ currentView = el.dataset.goto; render(); };
  });
  const sb = document.getElementById("search-box");
  if(sb) sb.oninput = (e)=>{ searchQ = e.target.value; render(); document.getElementById("search-box").focus(); document.getElementById("search-box").value=searchQ; document.getElementById("search-box").setSelectionRange(searchQ.length,searchQ.length); };
  const df = document.getElementById("dept-filter");
  if(df) df.onchange = (e)=>{ deptFilter = e.target.value; render(); };
  document.querySelectorAll(".col-filter").forEach(el=>{
    el.onchange = (e)=>{ colFilters[el.dataset.colfilter] = e.target.value; render(); };
  });
  const cf = document.getElementById("clear-filters");
  if(cf) cf.onclick = ()=>{ colFilters={}; deptFilter=""; render(); };
  document.querySelectorAll("tr[data-fn]").forEach(el=>{
    el.onclick = ()=>{ modalFn = el.dataset.fn; render(); };
  });
  const mc = document.getElementById("modal-close");
  if(mc) mc.onclick = ()=>{ modalFn=null; render(); };
  const ms = document.getElementById("modal-save");
  if(ms) ms.onclick = async ()=>{
    try{
      const fn = modalFn;
      const ov = overlayCache[fn] || {};
      const s = STAFF_DATA.find(x=>x.fn===fn);
      document.querySelectorAll("[data-field]").forEach(el=>{
        if(!el.disabled) ov[el.dataset.field] = el.value;
      });
      document.querySelectorAll("[data-corr]").forEach(el=>{
        if(el.disabled) return;
        const field = el.dataset.corr;
        const key = "corr_" + field;
        const original = (s && s[field]) || "";
        if(el.value === original){ delete ov[key]; }
        else { ov[key] = el.value; }
      });
      const progressReports = ov.progress_reports || {};
      document.querySelectorAll(".pq-check").forEach(el=>{
        const key = el.dataset.quarter;
        progressReports[key] = {submitted: el.checked};
      });
      ov.progress_reports = progressReports;
      overlayCache[fn] = ov;
      await saveOverlay();
      modalFn = null;
      render();
    }catch(e){
      alert("Couldn't save changes: " + e.message);
    }
  };
  const nu = document.getElementById("nu-submit");
  if(nu) nu.onclick = async ()=>{
    const err = document.getElementById("nu-err");
    try{
      const name = document.getElementById("nu-name").value.trim();
      const email = document.getElementById("nu-email").value.trim().toLowerCase();
      const role = document.getElementById("nu-role").value;
      const dept = document.getElementById("nu-dept").value;
      const designation = document.getElementById("nu-desig").value.trim();
      const pass = document.getElementById("nu-pass").value;
      if(!name||!email||!pass){ err.textContent="Fill in all fields."; return; }
      const pwErr2 = validatePassword(pass); if(pwErr2){ err.textContent=pwErr2; return; }
      await apiFetch("/api/users", {method:"POST", body: JSON.stringify({name, email, password: pass, role, department: dept, designation})});
      await refreshAdminData();
      render();
    }catch(e){
      err.textContent = e.message;
    }
  };
  document.querySelectorAll("[data-edit-user]").forEach(el=>{
    el.onclick = ()=>{ editingUserEmail = el.dataset.editUser; render(); };
  });
  document.querySelectorAll("[data-cancel-user]").forEach(el=>{
    el.onclick = ()=>{ editingUserEmail = null; render(); };
  });
  document.querySelectorAll("[data-save-user]").forEach(el=>{
    el.onclick = async ()=>{
      try{
        const email = el.dataset.saveUser;
        const u = usersCache.find(x=>x.email===email);
        if(!u) return;
        const row = el.closest("tr");
        const name = row.querySelector(".eu-name").value.trim() || u.name;
        const role = row.querySelector(".eu-role").value;
        const dept = row.querySelector(".eu-dept").value;
        const designation = row.querySelector(".eu-desig").value.trim();
        await apiFetch(`/api/users/${u.id}`, {method:"PATCH", body: JSON.stringify({name, role, department:dept, designation})});
        editingUserEmail = null;
        // if the current session's own account was edited, refresh session in place
        if(session && session.email === email){
          session = {email: u.email, name, role, dept: dept || ""};
        }
        await refreshAdminData();
        render();
      }catch(e){
        alert("Couldn't save user changes: " + e.message);
      }
    };
  });
  document.querySelectorAll("[data-approve-request]").forEach(el=>{
    el.onclick = async ()=>{
      try{
        const email = el.dataset.approveRequest;
        const p = pendingCache.find(x=>x.email===email);
        if(!p) return;
        await apiFetch(`/api/pending-requests/${p.id}/approve`, {method:"POST"});
        await refreshAdminData();
        render();
      }catch(e){
        alert("Couldn't approve request: " + e.message);
      }
    };
  });
  document.querySelectorAll("[data-reject-request]").forEach(el=>{
    el.onclick = async ()=>{
      try{
        const email = el.dataset.rejectRequest;
        const p = pendingCache.find(x=>x.email===email);
        if(!p) return;
        await apiFetch(`/api/pending-requests/${p.id}/reject`, {method:"POST"});
        await refreshAdminData();
        render();
      }catch(e){
        alert("Couldn't reject request: " + e.message);
      }
    };
  });
  document.querySelectorAll("[data-delete-user]").forEach(el=>{
    el.onclick = async ()=>{
      const email = el.dataset.deleteUser;
      if(session && session.email === email){
        alert("You can't delete the account you're currently signed in as.");
        return;
      }
      if(!confirm("Delete this account? This can't be undone.")) return;
      try{
        const u = usersCache.find(x=>x.email===email);
        if(!u) return;
        await apiFetch(`/api/users/${u.id}`, {method:"DELETE"});
        await refreshAdminData();
        render();
      }catch(e){
        alert("Couldn't delete user: " + e.message);
      }
    };
  });
  document.querySelectorAll("[data-forcereset-user]").forEach(el=>{
    el.onclick = async ()=>{
      try{
        const email = el.dataset.forceresetUser;
        const u = usersCache.find(x=>x.email===email);
        if(!u) return;
        await apiFetch(`/api/users/${u.id}/force-reset`, {method:"POST"});
        await refreshAdminData();
        render();
      }catch(e){
        alert("Couldn't force a password reset: " + e.message);
      }
    };
  });
  document.querySelectorAll("[data-changepw-user]").forEach(el=>{
    el.onclick = ()=>{ passwordEditEmail = el.dataset.changepwUser; render(); };
  });
  document.querySelectorAll("[data-cancel-password]").forEach(el=>{
    el.onclick = ()=>{ passwordEditEmail = null; render(); };
  });
  document.querySelectorAll("[data-set-password]").forEach(el=>{
    el.onclick = async ()=>{
      try{
        const email = el.dataset.setPassword;
        const u = usersCache.find(x=>x.email===email);
        if(!u) return;
        const row = el.closest("tr");
        const newPass = row.querySelector(".pw-new").value;
        const pwErr3 = validatePassword(newPass); if(pwErr3){ alert(pwErr3); return; }
        await apiFetch(`/api/users/${u.id}/set-password`, {method:"POST", body: JSON.stringify({password:newPass})});
        passwordEditEmail = null;
        await refreshAdminData();
        render();
      }catch(e){
        alert("Couldn't set password: " + e.message);
      }
    };
  });
}

(async function init(){
  document.getElementById("root").innerHTML = `<div class="app"><div class="center-screen"><div style="color:#cfd6e6;">Loading&hellip;</div></div></div>`;
  await loadOverlay();
  try{
    const status = await apiFetch("/api/setup-status");
    superuserExists = status.superuserExists;
  }catch(e){
    apiError = e.message;
  }
  render();
})();
</script>
